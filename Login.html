<!DOCTYPE html>
<html>
  <head>
  <meta charset="UTF-8">
  <title> login form</title>
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <style>
 @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@200;400;500;600;700;800;900&display=swap");
* {
margin: 0;
padding: 0;
box-sizing: border-box;
font-family: "Poppins", sans-serif;
}

body {
display: flex;
justify-content: center;
align-items: center;
min-height: 100vh;
background: url("photo/Pnn.jpg");
background-repeat: no-repeat;
background-size: cover;
background-position: center;
}

.wrapper {
margin-top: 48px;
width: 420px;
background-color: transparent;
border: 2px solid rgba(255, 255, 255, 0.2);
backdrop-filter: blur(15px);
box-shadow: 0 10px rgba(0, 0, 0, 0.2);
color: #fff;
border-radius: 16px;
padding: 20px 30px;
}
.wrapper h1 {
font-size: 30px;
text-align: center;
}

.wrapper .input-box { 
width: 100%;
height: 50px;
position: relative;
margin: 30px 0;
}

.input-box input {
width: 100%;
height: 100%;
background: transparent;
border: none;
outline: none;
border: 2px solid rgba(255, 255, 255, 0.2);
border-radius: 48px;
font-size: 16px;
padding: 20px 45px 20px 20px;
color: #fff;
}
.input-box input::placeholder {
color: #fff;
}

.input-box i{
position: absolute;
right: 20px;
top: 50%;
transform: translateY(-50%);
font-size: 28px;
}

.wrapper .remember-forgot {
display: flex;
justify-content: space-between;
font-size: 14px;
margin: 15px 0 15px;
}

.remember-forgot label input {
accent-color: #fff;
margin-right: 3px;
}

.remember-forgot a {
color: #fff;
text-decoration: none;
}

.wrapper .btn {
width: 100%;
height: 45px;
background: #fff;
border: none;
outline: none;
border-radius: 40px;
box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
cursor: pointer;
font-size: 16px;
color: #333;
font-weight: 600;
}

.wrapper .register-link {
text-align: center;
font-size: 14px;
margin: 20px 0 15px;
}

.wrapper .register-link p a {
color: #fff;
text-decoration: none;
font-weight: 600;
}

.wrapper .register-link p a:hover {
text-decoration: underline;
}
    
  </style>
  </head>
  <body>
    <div class="wrapper">
   <form id="login-form">
  <h1>Login</h1>
  
  <div class="input-box">
    <input type="email" id="login-email" placeholder="Email Address" required>
    <i class='bx bxs-envelope'></i>
  </div>
  
  <div class="input-box">
    <input type="password" id="login-password" placeholder="Password" required>
    <i class='bx bxs-lock-alt'></i>
  </div>
  
  <button type="submit" id="login-submit-btn" class="btn">Login</button>
  
  <div class="register-link">
    <p>Don't have an account? <a href="register.html">Register</a></p>
  </div>
</form>

<script type="module">
  // register.js - Handles new user sign-ups and role assignment via Supabase
import { supabase } from './supabase.js';

document.addEventListener("DOMContentLoaded", () => {
  const registerBtn = document.getElementById("register-submit-btn");

  if (registerBtn) {
    registerBtn.addEventListener("click", async (event) => {
      event.preventDefault();

      const fullName = document.getElementById("reg-name").value;
      const email = document.getElementById("reg-email").value;
      const password = document.getElementById("reg-password").value;
      const role = document.getElementById("reg-role").value;

      if (!fullName || !email || !password || role === "Select User Type") {
        alert("Please fill in all fields and select a role.");
        return;
      }

      try {
        registerBtn.innerHTML = "Creating Account...";

        // 1. Sign up the user in Supabase Auth
        const { data: authData, error: authError } = await supabase.auth.signUp({
          email: email,
          password: password,
        });

        if (authError) throw authError;

        // 2. Insert their specific Role and Name into the users public table
        const { error: dbError } = await supabase
          .from('users')
          .insert([
            { 
              id: authData.user.id, // Links directly to their secure Auth ID
              full_name: fullName, 
              email: email, 
              role: role 
            }
          ]);

        if (dbError) throw dbError;

        alert("Account created successfully! Welcome to FocusForge.");
        window.location.href = "Login.html";

      } catch (error) {
        console.error("Registration Error:", error.message);
        alert("Error: " + error.message);
        registerBtn.innerHTML = "Register";
      }
    });
  }
});
</script>
    </div>
  </body>
</html>
